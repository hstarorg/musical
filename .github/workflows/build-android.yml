name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.0.0）'
        required: true
        default: 'v1.0.0'
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Skia binaries
        run: node node_modules/@shopify/react-native-skia/scripts/install-libs.js

      - name: Prebuild Android
        run: pnpm prebuild:android

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Get version tag
        id: version
        run: echo "tag=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Musical ${{ steps.version.outputs.tag }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
